<style>
    .data{
        margin: auto;
        border-radius: 5px;
    }
    .recent_sale {
        width: 256px;
        margin: 4px;
    }
    .recent_sales {
        display: inline-flex;
        flex-wrap: wrap;
        image-rendering: pixelated;
        margin-left: auto;
        margin-right: auto;
        width: 100%;
    }
</style>
<html>
    <head>
        <script>
            document.addEventListener("DOMContentLoaded", async () => {

                const OS_KEY   = '48ffee972fc245fa965ecfe902b02ab4';
                const OS_SLUG  = 'fresh-frogs';
                const OS_HEADS = { 'X-API-KEY': OS_KEY, 'Accept': 'application/json' };

                // Pull collection info + stats (OpenSea v2)
                try {
                    const [infoRes, statsRes] = await Promise.all([
                        fetch('https://api.opensea.io/api/v2/collections/' + OS_SLUG, { headers: OS_HEADS }),
                        fetch('https://api.opensea.io/api/v2/collections/' + OS_SLUG + '/stats', { headers: OS_HEADS })
                    ]);
                    const info  = await infoRes.json();
                    const stats = await statsRes.json();
                    const s     = stats.total || {};

                    document.getElementById('banner_image').src  = info.banner_image_url || '';
                    document.getElementById('name').innerHTML     = info.name || OS_SLUG;
                    document.getElementById('count').innerHTML    = s.supply ?? info.total_supply ?? '—';
                    document.getElementById('num_owners').innerHTML = s.num_owners ?? '—';
                    document.getElementById('market_cap').innerHTML = s.market_cap != null ? Number(s.market_cap).toFixed(2) + ' Ξ' : '—';
                    document.getElementById('floor_price').innerHTML = s.floor_price != null ? Number(s.floor_price).toFixed(4) + ' Ξ' : '—';
                    document.getElementById('total_volume').innerHTML = s.volume != null ? Number(s.volume).toFixed(2) + ' Ξ' : '—';
                    document.getElementById('description').innerHTML  = info.description || '';
                    document.getElementById('created_date').innerHTML = info.created_date || '';

                    const count = parseInt(s.supply || info.total_supply || 0);
                    const initial_sales = (count - 3240) * 0.01;
                    document.getElementById('initial_sales').innerHTML = initial_sales > 0 ? initial_sales.toFixed(2) + ' Ξ' : '—';
                } catch (e) {
                    console.error('Collection info failed:', e);
                }

                // Get recent sales (OpenSea v2 events)
                try {
                    const res  = await fetch(
                        'https://api.opensea.io/api/v2/events/collection/' + OS_SLUG + '?event_type=sale&limit=7',
                        { headers: OS_HEADS }
                    );
                    const data = await res.json();
                    const events = data.asset_events || [];

                    events.forEach(sale => {
                        try {
                            const nft      = sale.nft || {};
                            const payment  = sale.payment || {};
                            const decimals = payment.decimals ?? 18;
                            const qty      = payment.quantity ?? '0';
                            const price    = (Number(qty) / Math.pow(10, decimals)).toFixed(4);
                            const imgUrl   = nft.image_url || nft.display_image_url || '';
                            const name     = nft.name || ('Frog #' + nft.identifier);

                            const el = document.createElement('div');
                            el.style.verticalAlign = 'center';
                            el.style.textAlign = 'center';
                            el.style.width = 'auto';
                            el.innerHTML =
                                '<img class="recent_sale" src="' + imgUrl + '">' +
                                '<p>' + name + ' | ' + price + ' Ξ</p>';
                            document.getElementById('recent_sales').appendChild(el);
                        } catch (e) { console.log(e.message); }
                    });
                } catch (e) {
                    console.error('Recent sales failed:', e);
                }
            })
        </script>
    </head>
    <body>
        <img class="banner_image" id="banner_image" src=""/>
        <a href="https://opensea.io/collection/fresh-frogs" target="_blank"><h1 id="name">Loading...</h1></a>
        <p>Items: <b id="count"></b> | Owners: <b id="num_owners"></b> | Market Cap: <b id="market_cap"></b> | Floor Price: <b id="floor_price"></b> | Total Volume: <b id="total_volume"></b> | Initial Sales: <b id="initial_sales"></b></p>
        <p id="description"></p>
        <hr>
        <p><i id="created_date"></i></p>
        <div id="recent_sales" class="recent_sales"></div>
    <body>
</html>
