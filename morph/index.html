<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fresh Frogs — Morph</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="/the-pad/Frog/greenTreeFrog.png" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="page">
    <header class="site-header">
      <nav class="nav">
        <div class="nav-left">
          <span class="logo">🐸 freshfrogs</span>
          <a href="/" data-view="collection">Collection</a>
          <a href="/rarity/" data-view="rarity">Rarity</a>
          <a href="/pond/" data-view="pond">Pond</a>
          <a href="/morph/" data-view="morph" class="active">Morph</a>
        </div>
        <div class="nav-right">
          <a href="#" id="header-connect-wallet-btn">Connect Wallet</a>
          <a href="#" data-view="wallet" id="wallet-nav-link" style="display:none;"></a>
        </div>
      </nav>
    </header>

    <main class="dashboard-main" style="padding-top:1.5rem;">
      <section class="dashboard-section" id="morph-panel">
        <h2 class="section-heading">Morph Lab</h2>
        <p class="dashboard-note">Combine two Frogs into one unique morphed Frog.</p>

        <div id="morph-ui">
          <p class="dashboard-note" id="morph-status">Connect your wallet to morph Frogs.</p>

          <div style="display:flex;gap:2rem;flex-wrap:wrap;margin:1rem 0;">
            <div>
              <p class="dashboard-note">Select Frog A</p>
              <div id="morph-frog-a-container" class="morph-gallery"></div>
              <div id="morph-frog-a-preview" class="frog_img_cont" style="width:128px;border-radius:8px;border:2px solid var(--border);"></div>
            </div>
            <div>
              <p class="dashboard-note">Select Frog B</p>
              <div id="morph-frog-b-container" class="morph-gallery"></div>
              <div id="morph-frog-b-preview" class="frog_img_cont" style="width:128px;border-radius:8px;border:2px solid var(--border);"></div>
            </div>
          </div>

          <button id="morph-btn" class="btn primary" type="button" style="margin-top:1rem;" disabled>Morph Frogs</button>
          <p class="dashboard-note" id="morph-result" style="margin-top:0.5rem;"></p>

          <h2 class="section-heading" style="margin-top:2.5rem;">Recent Morphs</h2>
          <p class="dashboard-note" id="morph-recent-status">Loading...</p>
          <div id="morph-recent-grid" class="frog-grid"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <span>🐸 freshfrogs.github.io</span>
      <span>
        <a href="https://opensea.io/collection/fresh-frogs" target="_blank" rel="noopener noreferrer">OpenSea</a>
        &nbsp;·&nbsp;
        <a href="https://etherscan.io/token/0xbe4bef8735107db540de269ff82c7de9ef68c51b" target="_blank" rel="noopener noreferrer">Etherscan</a>
      </span>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
  <script src="/assets/collection_abi.js"></script>
  <script src="/assets/controller_abi.js"></script>
  <script src="/assets/ethereum-dapp.js"></script>
  <script src="/assets/rarityrankings.js"></script>
  <script src="/assets/site.js"></script>
</body>
</html>
